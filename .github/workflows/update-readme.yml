name: Update README

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-activity
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme-with-activity:
    name: Update profile recent activity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render Recent Activity into README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIVITY_USERNAME: ${{ github.repository_owner }}
          MAX_ACTIVITY_LINES: "10"
          README_FILE: "README.md"
        run: python3 scripts/update_recent_activity.py

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit"
            exit 0
          fi
          git commit -m "chore(readme): update recent activity"
          git push
