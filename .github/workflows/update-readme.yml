name: Update README

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-activity
  cancel-in-progress: true

jobs:
  update-readme-with-activity:
    name: Update profile recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update recent activity section
        uses: jamesgeorge007/github-activity-readme@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GH_USERNAME: hongzhi-gao
          MAX_LINES: 8
          COMMIT_MSG: "chore(readme): update recent GitHub activity"
